version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - echo "EMAIL_PASS=$EMAIL_PASS" >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
